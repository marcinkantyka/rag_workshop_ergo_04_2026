      DKV hospitalisation insurance?
    answer: 'According to the provided context, the personal contribution for single
      room stays under DKV hospitalisation insurance varies depending on the specific
      product:


      **DKV Plus Hospitalisation [1]:**

      - Accommodation costs are reimbursed up to EUR 150 per day for single rooms

      - A personal contribution of 15% applies to honorary supplements exceeding EUR
      300 per stay [4]


      **DKV Flexi PRO [3]:**

      - A personal contribution (deductible) of either **EUR 150 or EUR 300 per hospitalization**
      applies, depending on the choice made by the insurance taker at the time of
      subscription

      - A relapse resulting in a new admission is considered a new hospitalization,
      meaning a new personal contribution applies


      **Note:** The exact personal contribution amount depends on which DKV hospitalization
      product you have chosen. The context indicates that the specific amounts are
      detailed in the Particular Conditions of Insurance for each product variant.'
