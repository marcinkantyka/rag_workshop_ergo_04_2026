    question: What hospitalization expenses does DKV cover?
    answer: '# DKV Hospitalization Coverage


      According to the provided context, DKV covers the following hospitalization-related
      expenses:


      **Covered Medical Expenses:**

      - Medical and paramedical treatments [1][3][5]

      - Medical devices [1][3][5]

      - Medicines and drugs [1][4]

      - Bandages and medical material [1][3][5]

      - All items must be on medical prescription by a physician [1][3][5]


      **Additional Covered Items:**

      - Wig costs up to €1,250 [4]

      - Psychotherapeutic treatment costs when dispensed by a licensed psychiatrist
      [4]

      - Medically assisted procreation (subject to prior approval and reimbursement
      from legal/statutory health insurance) [4]


      **Expenses Requiring Prior DKV Approval:**

      - Rental or purchase of medical devices (except spectacle glasses, contact lenses,
      fully non-implantable hearing aids, trusses for hernia, varicose vein stockings,
      orthopedic soles, plaster casts, lumbar corsets, splints, and crutches) [1][3][5]

      - Dental treatments (with treatment plan and accurate cost estimate) [1][3][5]

      - Reconstructive plastic surgery (with accurate cost estimate) [1][3][5]


      **Note:** For Premium+ plans, alternative treatments are also covered [2].'
