    question: What planned care abroad coverage does DKV hospitalisation insurance
      provide?
    answer: '# DKV Planned Care Abroad Coverage


      According to [1] and [2], DKV Hospitalisation Insurance provides the following
      coverage for planned care abroad:


      **In European Union Member States:**

      - Coverage for any medically necessary and planned hospitalization abroad

      - **Requirement:** Prior agreement must be obtained with the health insurance
      fund before receiving treatment


      **Additional Coverage:**

      - Coverage extends to outpatient consultations and/or treatments in the pre-
      and post-hospitalization period of a covered hospitalization in Belgium, within
      the context of "Critical Illnesses" [1] and [2]


      **Important Limitation:**

      - For hospitalizations outside the European Union, DKV reimburses up to a maximum
      of €300,000 per insurance case [1] and [2]


      The key distinction is that planned hospitalizations in EU Member States require
      prior approval from the health insurance fund, whereas coverage outside the
      EU is limited to emergencies and is capped at €300,000.'
