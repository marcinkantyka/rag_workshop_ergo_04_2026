    answer: 'According to [1], DKV Hospi Essential is:


      • **Individual hospitalization insurance** with compensatory character that
      operates after intervention of the Belgian legal/statutory health insurance

      • **Assistance insurance abroad**

      • Subject to Belgian legislation, belonging to branch 2 ''health'' and branch
      18 ''assistance''


      The insurance is available to any natural person with domicile and factual principal
      residence in Belgium who has not reached the age of 70 when taking out the insurance
      contract.'
