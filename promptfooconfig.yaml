      a compensatory character after the intervention of the Belgian statutory health
      insurance, combined with an assistance insurance abroad. It covers hospitalisation
      costs for illness, accident, or childbirth, with free choice of hospital and
      recognised healthcare provider, and reimburses actual costs including co-payments
      and supplements.
