    question: How does DKV cover emergency medical care abroad?
    answer: '# DKV Coverage for Emergency Medical Care Abroad


      According to the provided context, DKV offers the following coverage for emergency
      medical care abroad:


      ## Worldwide Coverage

      **For unforeseen hospitalizations:** According to [1], DKV provides worldwide
      cover for any medically necessary, unforeseen hospitalization abroad, provided
      the insured person does not temporarily stay abroad for more than 90 consecutive
      days. This period extends to 6 months for students under 26 in EU Member States
      (excluding overseas territories) when studying under bilateral or multilateral
      programs.


      ## Maximum Reimbursement

      **Outside the EU:** According to [1], DKV reimburses up to a maximum of €300,000
      per insurance case for hospitalizations outside the European Union.


      ## Reporting Requirements

      According to [2], policyholders must report insurance cases through the "Assistance
      abroad" DKV ASSISTANCE cover by:

      - **Telephone:** +32 2 230 31 32, within 48 hours of the start of hospitalization
      or as soon as reasonably possible


      ## Additional Assistance Services

      According to [4], DKV Assistance includes:

      - Repatriation in case of accidents/illness

      - Reimbursement of medical costs for urgent, unforeseen hospitalization abroad
      (when legal health insurance doesn''t intervene)

      - Return arrangements for other insureds or minor children'
    ground_truth: In the event of a medical emergency abroad, DKV reimburses medical
