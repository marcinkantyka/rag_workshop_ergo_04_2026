- vars:
    question: What nursing home coverage does DKV provide after a hospital stay?
    answer: 'According to [1], DKV provides the following nursing home coverage after
      a hospital stay:


      **Eligibility Requirements:**

      - Hospitalisation of at least 5 consecutive days

      - Transfer to the nursing home occurs within 30 days of hospital discharge

      - A medical certificate confirms the necessity of the placement


      **Coverage Limits:**

      - **Maximum duration:** 90 days per insurance year

      - **Reimbursement amount:** Up to EUR 75 per day in a nursing home, after deduction
      of the compulsory health insurance contribution'
    ground_truth: DKV covers nursing home accommodation costs up to EUR 75 per day,
      limited to 90 days per insurance year, provided the preceding hospitalisation
      lasted at least 5 consecutive days, transfer to the nursing home occurs within
      30 days of hospital discharge, and a medical certificate confirms the necessity.
