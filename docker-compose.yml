services:

  # Downloads ML models into a shared volume on first run, then exits.
  # Subsequent starts skip this entirely (models already cached).
  model-init:
    build: .
    image: lukasstuetzel/rag_workshop_ergo:latest
    container_name: rag-model-init
    volumes:
      - model-cache:/root/.cache/huggingface
    command: >
      python -c "import os, pathlib; marker = pathlib.Path('/root/.cache/huggingface/.models_ready'); (print('Models already cached, skipping.') or exit(0)) if marker.exists() else None; print('Downloading ML models (~600 MB, one-time)...'); from sentence_transformers import SentenceTransformer, CrossEncoder; SentenceTransformer('paraphrase-multilingual-mpnet-base-v2').encode('test'); SentenceTransformer('paraphrase-multilingual-MiniLM-L12-v2').encode('test'); SentenceTransformer('all-MiniLM-L6-v2').encode('test'); CrossEncoder('cross-encoder/ms-marco-MiniLM-L-6-v2'); marker.touch(); print('Models ready.')"
    restart: "no"

  workshop:
    build: .
    image: lukasstuetzel/rag_workshop_ergo:latest
    container_name: rag-workshop
    depends_on:
      model-init:
        condition: service_completed_successfully
    ports:
      - "8888:8888"
    volumes:
      # Workshop code — edits in JupyterLab are saved to your disk
      - .:/workspace
      # ML model cache — pre-populated by model-init, shared here
      - model-cache:/root/.cache/huggingface
    environment:
      - NETLIGHT_API_KEY=${NETLIGHT_API_KEY}
      - NETLIGHT_BASE_URL=${NETLIGHT_BASE_URL}
      - JUPYTER_TOKEN=workshop
    env_file:
      - .env
    restart: unless-stopped

volumes:
  model-cache:
